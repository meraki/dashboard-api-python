name: Test Python library generator

on:
  push:
    branches: ['main', 'release']
    paths:
      - 'generator/**'
      - 'tests/generator/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: ['main', 'release']
    paths:
      - 'generator/**'
      - 'tests/generator/**'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --python 3.13

    - name: Lint with flake8
      run: |
        uv run flake8 ./generator/generate_library.py --count --select=E9,F63,F7,F82 --ignore=F405,W391,W291,C901,E501,E303,W293 --show-source --statistics
        uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --python 3.13 --group generator

    - name: Test generator
      run: uv run pytest tests/generator/ -v
