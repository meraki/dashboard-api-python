name: Regenerate Python Library
on:
  workflow_dispatch:
    inputs:
      library_version:
        description: 'The version of the new library'
        required: true
      api_version:
        description: 'The corresponding version of the API'
        required: true
      branch_name:
        description: 'Branch to commit changes to (release or beta-release)'
        required: false
        default: 'release'
      target_branch:
        description: 'Branch to merge into (main or beta)'
        required: false
        default: 'main'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group generator

      - name: Delete folder
        run: rm -rf meraki

      - name: Regenerate Python Library
        env:
          LIBRARY_VERSION: ${{ github.event.inputs.library_version }}
          API_VERSION: ${{ github.event.inputs.api_version }}
          MERAKI_DASHBOARD_API_KEY: ${{ github.event.inputs.target_branch == 'beta' && secrets.TEST_ORG_API_KEY || '' }}
          BETA_ORG_ID: ${{ github.event.inputs.target_branch == 'beta' && secrets.TEST_ORG_BETA_00_ID || '' }}
        run: |
          ARGS="-g true -v $LIBRARY_VERSION -a $API_VERSION"
          if [ -n "$BETA_ORG_ID" ]; then
            ARGS="$ARGS -o $BETA_ORG_ID"
          fi
          uv run python generator/generate_library.py $ARGS

      - name: Set new version
        env:
          LIBRARY_VERSION: ${{ github.event.inputs.library_version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$LIBRARY_VERSION\"/" pyproject.toml
          uv lock

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Commit changes to new branch
        uses: EndBug/add-and-commit@v10
        with:
          author_name: GitHub Action
          author_email: support@meraki.com
          message: Auto-generated library v${{ github.event.inputs.library_version }} for API v${{ github.event.inputs.api_version }}.
          new_branch: ${{ github.event.inputs.branch_name }}
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base "${{ github.event.inputs.target_branch }}" \
            --head "${{ github.event.inputs.branch_name }}" \
            --title "Release v${{ github.event.inputs.library_version }} (API v${{ github.event.inputs.api_version }})" \
            --body "Auto-generated library v${{ github.event.inputs.library_version }} for API v${{ github.event.inputs.api_version }}."

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ github.event.inputs.branch_name }}" \
            --auto --squash

