name: Regenerate Python Library
on:
  workflow_dispatch:
    inputs:
      library_version:
        description: 'The version of the new library'
        required: true
      api_version:
        description: 'The corresponding version of the API'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group generator

      - name: Delete folder
        run: rm -rf meraki

      - name: Regenerate Python Library
        env:
          LIBRARY_VERSION: ${{ github.event.inputs.library_version }}
          API_VERSION: ${{ github.event.inputs.api_version }}
          ORG_ID: ${{ secrets.TEST_ORG_ID }}
          API_KEY: ${{ secrets.TEST_ORG_API_KEY }}
        run: uv run python generator/generate_library.py -g true -v "$LIBRARY_VERSION" -a "$API_VERSION" -o "$ORG_ID" -k "$API_KEY"

      - name: Set new version
        env:
          LIBRARY_VERSION: ${{ github.event.inputs.library_version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$LIBRARY_VERSION\"/" pyproject.toml
          uv lock

      - name: Commit changes to new branch
        uses: EndBug/add-and-commit@v9
        with:
          author_name: GitHub Action
          author_email: support@meraki.com
          message: Auto-generated library v${{ github.event.inputs.library_version }} for API v${{ github.event.inputs.api_version }}.
          new_branch: release
