name: Test Python library

on:
  push:
    branches: ['main', 'release']
    paths:
      - 'meraki/**'
      - 'tests/unit/**'
      - 'tests/integration/**'
      - 'tests/benchmarks/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: ['main', 'release']
    paths:
      - 'meraki/**'
      - 'tests/unit/**'
      - 'tests/integration/**'
      - 'tests/benchmarks/**'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --python 3.13

    - name: Lint with ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .

  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}

    - name: Unit tests with coverage
      run: uv run pytest tests/unit --cov --cov-report=term-missing --cov-fail-under=90

  assign-orgs:
    runs-on: ubuntu-latest
    outputs:
      assignments: ${{ steps.shuffle.outputs.assignments }}
    steps:
      - name: Shuffle org assignments
        id: shuffle
        run: |
          python3 -c "
          import json, random
          versions = ['3.11', '3.12', '3.13', '3.14']
          indices = list(range(4))
          random.shuffle(indices)
          assignments = dict(zip(versions, indices))
          print(f'assignments={json.dumps(assignments)}')
          " >> "$GITHUB_OUTPUT"

  integration-test:
    needs: [assign-orgs]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}

    - name: Integration tests
      env:
        ORG_0: ${{ secrets.TEST_ORG_ID }}
        ORG_1: ${{ secrets.TEST_ORG_ID_1 }}
        ORG_2: ${{ secrets.TEST_ORG_ID_2 }}
        ORG_3: ${{ secrets.TEST_ORG_ID_3 }}
      run: |
        INDEX=$(echo '${{ needs.assign-orgs.outputs.assignments }}' | jq -r '.["${{ matrix.python-version }}"]')
        VAR_NAME="ORG_${INDEX}"
        ORG_ID="${!VAR_NAME}"
        uv run pytest tests/integration -v --tb=short --apikey ${{ secrets.TEST_ORG_API_KEY }} --o "$ORG_ID"

    - name: Validate against baseline
      run: |
        INDEX=$(echo '${{ needs.assign-orgs.outputs.assignments }}' | jq -r '.["${{ matrix.python-version }}"]')
        VAR_NAME="ORG_${INDEX}"
        ORG_ID="${!VAR_NAME}"
        EXPECTED_TOTAL=32
        ACTUAL=$(uv run pytest tests/integration --co -q --apikey ${{ secrets.TEST_ORG_API_KEY }} --o "$ORG_ID" 2>/dev/null | tail -1 | grep -oP '\d+')
        echo "Collected tests: $ACTUAL (baseline: $EXPECTED_TOTAL)"
        if [ "$ACTUAL" -lt "$EXPECTED_TOTAL" ]; then
          echo "::error::Regression: collected $ACTUAL tests, baseline expects $EXPECTED_TOTAL"
          exit 1
        fi
      env:
        ORG_0: ${{ secrets.TEST_ORG_ID }}
        ORG_1: ${{ secrets.TEST_ORG_ID_1 }}
        ORG_2: ${{ secrets.TEST_ORG_ID_2 }}
        ORG_3: ${{ secrets.TEST_ORG_ID_3 }}

  benchmark:
    runs-on: ubuntu-latest
    needs: [unit-test]
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}

    - name: Run benchmarks
      run: uv run pytest tests/benchmarks --benchmark-json=benchmark-${{ matrix.python-version }}.json

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-py${{ matrix.python-version }}
        path: benchmark-${{ matrix.python-version }}.json
